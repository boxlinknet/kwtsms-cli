name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    # CGO_ENABLED=0 ensures pure Go builds, allowing a single Linux runner
    # to cross-compile for all 6 targets including macOS and Windows.
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: kwtsms-cli-linux-x64
          - goos: linux
            goarch: arm64
            asset: kwtsms-cli-linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            asset: kwtsms-cli-linux-armv7
          - goos: darwin
            goarch: amd64
            asset: kwtsms-cli-macos-x64
          - goos: darwin
            goarch: arm64
            asset: kwtsms-cli-macos-arm64
          - goos: windows
            goarch: amd64
            asset: kwtsms-cli-windows-x64.exe

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
          ASSET_NAME: ${{ matrix.asset }}
        run: go build -ldflags="-s -w -X github.com/boxlinknet/kwtsms-cli/cmd.version=${GITHUB_REF_NAME}" -o "$ASSET_NAME" .

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: "kwtsms-cli-*"
          generate_release_notes: true
